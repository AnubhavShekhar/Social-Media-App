name: Backend Tests

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: testuser
                    POSTGRES_PASSWORD: testpassword
                    POSTGRES_DB: thread_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        
        defaults:
            run:
                working-directory: backend

        env:
            DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/thread_test
            JWT_SECRET: ${{ secrets.JWT_SECRET }}
            JWT_ALGORITHM: HS256
            IMAGEKIT_PUBLIC_KEY: fake_public_key
            IMAGEKIT_PRIVATE_KEY: fake_private_key
            IMAGEKIT_URL: https://ik.imagekit.io/fake

        steps:
        - name: Checkout code
          uses: actions/checkout@v4
    
        - name: Install uv
          uses: astral-sh/setup-uv@v5
    
        - name: Install dependencies
          run: uv sync
    
        - name: Run Alembic migrations
          run: uv run alembic upgrade head
    
        - name: Run tests
          run: uv run pytest