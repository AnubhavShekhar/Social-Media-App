services:
  - name: Social-Media-App
    type: web
    runtime: node
    rootDir: frontend
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://Social-Media-App-backend.onrender.com

  - name: Social-Media-App-backend
    type: web
    runtime: python
    rootDir: backend
    buildCommand: uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: uv run alembic upgrade head
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_URL
        sync: false
      - key: JWT_ALGORITHM
        value: HS256

databases:
  - name: my-postgres